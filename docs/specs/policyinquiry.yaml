        externalIds:
          $ref: '#/components/schemas/ProducerExternalIds'
        commissionOption:
          type: string
          maxLength: 50
          description: Commission option on the contract
        commission:
          $ref: '#/components/schemas/ProducerCommission'
          description: Defines commission-related details assigned to the producer,
            including identifiers and allocation percentages that determine how compensation
            is distributed for the policy
        producerNumber:
          type: string
          maxLength: 50
          pattern: ^[A-Za-z0-9._-]{1,50}$
          description: Carrier-assigned producer identifier.
    ProducerExternalIds:
      type: object
      properties:
        npn:
          type: string
          maxLength: 10
          pattern: ^[0-9]{1,10}$
        crdNumber:
          type: string
          pattern: ^[0-9]{1,12}$
        agencyId:
          type: string
          pattern: ^[0-9]{1,18}$
        firmId:
          type: string
          pattern: ^[0-9]{1,18}$
    ProducerCommission:
      type: object
      properties:
        commissionIdentifier:
          type: string
          pattern: ^[A-Za-z0-9._-]{1,100}$
        commissionSplitPercent:
          type: number
          minimum: 0
          maximum: 100
    PolicyDates:
      type: object
      description: Policy date fields for the contract.
      properties:
        policyStartDate:
          type: string
          format: date
        applicationDate:
          type: string
          format: date
        applicationReceivedDate:
          type: string
          format: date
        issueDate:
          type: string
          format: date
        policyDeliveryDate:
          type: string
          format: date
        previousPolicyAnniversaryDate:
          type: string
          format: date
        previousPolicyMonthiversaryDate:
          type: string
          format: date
        nextAnniversaryDate:
          type: string
          format: date
        maturityDate:
          type: string
          format: date
        policyTerminationDate:
          type: string
          format: date
        initialPaymentExpiryDate:
          type: string
          format: date
        nextMonthiversaryDate:
          type: string
          format: date
      required:
      - policyStartDate
      - issueDate
    SystematicProgramsList:
      type: object
      properties:
        systematicPrograms:
          type: array
          items:
            $ref: '#/components/schemas/SystematicProgram'
        startIndex:
          type: integer
          minimum: 0
          description: Used for pagination to indicate where the returned page starts
            within the full result set.
        itemsCount:
          type: integer
          minimum: 0
          description: Number of records included in the current response page.
        totalItemsCount:
          type: integer
          minimum: 0
          description: Total number of records available that match the request criteria,
            independent of pagination.
    SystematicProgram:
      type: object
      required:
      - arrangementType
      - allocationOptionType
      - frequency
      - startDate
      - endDate
      - nextProgramDate
      - amountType
      - externalArrangementId
      - paymentForm
      - numOfModalOccurrences
      - sourceTransferAmtType
      - destTransferAmtType
      - arrSource
      - arrSubType
      properties:
        arrangementType:
          type: string
          enum:
          - PAYMENT
          - WITHDRAWAL
          - LOANREPAYMENT
          - REQUIREDMINIMUMDISTRIBUTION
          - PAYOUT
          description: Identifies the high-level type of systematic program set up
            on the policy, such as payment, withdrawal, loan repayment, RMD, or payout.
        allocationOptionType:
          type: string
          enum:
          - PRORATA
          - DOLLAR
          - SPECIFYPERCENTAGE
          - SPECIFIEDFUNDS
          - SPECIFIEDSEGMENTS
          - DEFAULT
          - PECKINGORDER
          - EARNINGSONLY
          description: Specifies the method used to allocate the withdrawal amount
            within the policy.
        paymentForm:
          type: string
          enum:
          - DTCC
          - EFT
          - ACH
          - CHECK
          - WIRE
          description: Recurring systematic-program payment form. `EFT` is valid here;
            `EXCHANGE` is intentionally excluded because exchange handling is party-specific
            rather than a recurring disbursement mode.
        frequency:
          type: string
          enum:
          - DAILY
          - EVERYTWOWEEKS
          - MONTHLY
          - SEMIANNUAL
          - QUARTERLY
          - ANNUAL
          - SINGLEPAYMENT
          description: Indicates how often the systematic program is scheduled to
            run, such as daily, every two weeks, monthly, semiannual, quarterly, annual,
            or single payment.
        startDate:
          type: string
          format: date
          description: The date when the systematic program begins executing payments
            or transfers (entered by user)
        endDate:
          type: string
          format: date
          description: The date Special Program ends (Entered by user or determined
            by LPS based on Account Value)
        previousProgramDate:
          type: string
          format: date
          description: The last date on which a systematic transaction was processed
        optedNextProgramDate:
          type: string
          format: date
          description: A user-selected or modified next payment date, different from
            the scheduled one
        nextProgramDate:
          type: string
          format: date
          description: The date on which the next payment is scheduled
        amountType:
          type: string
          enum:
          - AMOUNT
          - PERCENTAGE
          - MAX
          - FREEWITHDRAWALAMOUNT
          - WITHDRAWALUNTILBASIS
          - EARNINGSONLY
          - MODIFIEDEARNINGSONLY
          description: Indicates how the scheduled amount is defined for the systematic
            program, such as a fixed amount, percentage, maximum available amount,
            free withdrawal amount, withdrawal until basis, earnings only, pro rata
            amount, or modified earnings only.
        requestedAmount:
          type: number
          minimum: 0
          maximum: 9999999999.99
          description: Required when amountType is 'AMOUNT'. Mutually exclusive with
            requestedPercentage. Omit this field when amountType is not AMOUNT instead
            of sending null.
        requestedPercentage:
          type: number
          description: Required when amountType is 'PERCENTAGE'. Mutually exclusive
            with requestedAmount. Populate for PERCENTAGE requests; otherwise omit
            the field.
          minimum: 0
          maximum: 100
        externalArrangementId:
          type: string
          maxLength: 100
          description: Identifier used to uniquely recognize an existing systematic
            program (e.g., SWP) associated with a contract. This ID enables the system
            to determine whether a systematic arrangement already exists and supports
            subsequent updates, modifications, or termination of that arrangement.
        numOfModalOccurrences:
          type: integer
          minimum: 0
          maximum: 9999999999
          description: Amount value used the mode.
        modalAmt:
          type: number
          minimum: 0
          maximum: 9999999999.99
          description: Legacy DD abbreviation retained; represents modal amount.
        modalPct:
          type: number
          minimum: 0
          maximum: 100
          description: Legacy DD abbreviation retained; represents modal percentage.
        sourceTransferAmtType:
          type: string
          enum:
          - AMOUNT
          - PERCENTAGE
          - PRO_RATA
          - SPECIFIED_FUNDS
          - ALL_FUNDS
          - OTHER
          description: Source transfer type.
        destTransferAmtType:
          type: string
          enum:
          - AMOUNT
          - PERCENTAGE
          - PRO_RATA
          - SPECIFIED_FUNDS
          - ALL_FUNDS
          - OTHER
          description: Destination transfer type.
        arrSource:
          type: string
          enum:
          - TransferAmt
          - TransferPct
          description: Legacy DD abbreviation retained; represents arrangement source.
            Arrangement source retained per DD naming.
        taxWithholdingInstructions:
          type: array
          items:
            $ref: '#/components/schemas/TaxWithholdingInstruction'
        arrSubType:
          type: string
          pattern: ^[A-Za-z0-9_ -]{1,100}$
          maxLength: 100
          description: Legacy DD abbreviation retained; represents arrangement subtype.
            Arrangement subtype retained per DD naming.
        dayOfMonth:
          type: string
          pattern: ^(?:[1-9]|[12][0-9]|3[01])$
          description: Day of month for the scheduled arrangement.
        productCode:
          type: string
          pattern: ^[A-Za-z0-9._-]{1,50}$
          description: Unique fund/sub-account code for the product (carrier’s fund
            code).
        parties:
          type: array
          items:
            type: object
            required:
            - partyRole
            - taxId
            - paymentForm
            - percentage
            - bankId
            properties:
              partyRole:
                type: string
                enum:
                - Payor
                - Payee
                description: Role of the party within the systematic program. Uses
                  PascalCase values to align with the PartyRole filter vocabulary.
              taxId:
                type: string
                maxLength: 9
                pattern: ^[0-9]{9}$
                minLength: 9
              percentage:
                type: number
                minimum: 0
                maximum: 100
              bankId:
                type: string
                maxLength: 100
              addressId:
                type: string
                maxLength: 100
              paymentForm:
                type: string
                enum:
                - DTCC
                - ACH
                - CHECK
                - WIRE
                - EXCHANGE
                description: Specifies the method by which payments or disbursements
                  related to the party will be made (e.g., ACH, check, wire).
          description: Represents all individuals or entities associated with the
            policy, including their identity, relationship to the contract, and role
            in policy servicing or benefit distribution.
      allOf:
      - if:
          properties:
            amountType:
              const: AMOUNT
              description: Indicates how the scheduled amount is defined for the systematic
                program, such as a fixed amount, percentage, maximum available amount,
                free withdrawal amount, withdrawal until basis, earnings only, pro
                rata amount, or modified earnings only.
          required:
          - amountType
        then:
          required:
          - requestedAmount
          not:
            required:
            - requestedPercentage
      - if:
          properties:
            amountType:
              const: PERCENTAGE
              description: Indicates how the scheduled amount is defined for the systematic
                program, such as a fixed amount, percentage, maximum available amount,
                free withdrawal amount, withdrawal until basis, earnings only, pro
                rata amount, or modified earnings only.
          required:
          - amountType
        then:
          required:
          - requestedPercentage
          not:
            required:
            - requestedAmount
      - if:
          properties:
            amountType:
              enum:
              - MAX
              - FREEWITHDRAWALAMOUNT
              - WITHDRAWALUNTILBASIS
              - EARNINGSONLY
              description: Indicates how the scheduled amount is defined for the systematic
                program, such as a fixed amount, percentage, maximum available amount,
                free withdrawal amount, withdrawal until basis, earnings only, pro
                rata amount, or modified earnings only.
          required:
          - amountType
        then:
          required:
          - amountType
          not:
            anyOf:
            - required:
              - requestedAmount
            - required:
              - requestedPercentage
    Rider:
      type: object
      required:
      - timestamp
      - effectiveDate
      - exerciseDate
      - terminationDate
      - status
      - coverageId
      - amount
      properties:
        timestamp:
          type: string
          format: date-time
          description: Create or Update timestamp of transaction event
        riderType:
          type: string
          enum:
          - BASE
          - RIDER
          - INTEGRATED_RIDER
          - BENEFIT_RIDER
          - INCOME_RIDER
          - DEATH_BENEFIT_RIDER
          - LTC_RIDER
          - GMWB_RIDER
          - GMDB_RIDER
          - GMAB_RIDER
          - CHARGE_RIDER
          - DISCOUNT
          - BASE_INCREASE
          - RIDER_INCREASE
          - OTHER
          - UNKNOWN
          description: Indicates whether the record represents the base contract or
            a specific rider/benefit feature attached to the policy. This value is
            used to categorize riders for servicing and display purposes and is independent
            of transaction events or statuses.
        riderName:
          type: string
          maxLength: 200
          description: The specific name of the rider as designated by the insurance
            company. For example - Terminal Illness Accelerated Death Benefit
        isRiderElected:
          type: boolean
          description: Indicates the election status of the rider on the policy, specifying
            whether the policyholder has formally elected to include the rider
        riderCode:
          type: string
          pattern: ^[A-Za-z0-9._-]{1,50}$
          description: A unique identifier or alphanumeric code assigned to the rider
        underwritingStatus:
          type: string
          enum:
          - APPROVED
          - DECLINED
          description: Indicates underwriting decision status associated with the
            policy or rider.
        effectiveDate:
          type: string
          format: date
          description: Represents the date on which the policy or contract became
            active and coverage officially began.
        exerciseDate:
          type: string
          format: date
          description: The date the policyholder elects to use or activate the rider
            benefit
        terminationDate:
          type: string
          format: date
          description: The date on which the rider coverage ends/ is terminated
        status:
          type: string
          enum:
          - ACTIVE
          - TERMINATED
          - PENDING
          - SUSPENDED
          description: A Feature Status in life insurance and annuities indicates
            the current state or activation condition of a specific feature within
            a policy or contract. It reflects whether a feature is active, inactive,
            pending, or restricted, helping insurers, agents, and policyholders track
            policy functionality
        coverageId:
          type: string
          pattern: ^[A-Za-z0-9._-]{1,100}$
          description: The Coverage ID is a unique identifier assigned to a specific
            coverage type or benefit within an insurance policy. It helps insurance
            companies, agents, and policyholders track and differentiate multiple
            coverage components within a single policy
        amount:
          type: number
          minimum: 0
          maximum: 9999999999.99
          description: The total benefit amount the rider provides (separate from
            the base policy’s coverage.)
        annualBenefitAmount:
          type: number
          minimum: 0
          maximum: 9999999999.99
          description: The maximum benefit amount of the benefit base, policyholder
            can withdraw each year
        riderBenefitAmount:
          type: number
          minimum: 0
          maximum: 9999999999.99
          description: The Total Benefit Amount represents the maximum guaranteed
            amount available under the annuity rider over the life of the contract/rider
        riderBenefitPercent:
          type: number
          multipleOf: 0.01
          minimum: 0
          maximum: 100
          description: The fixed percentage applied to the Rider Benefit Amount to
            calculate the annual guaranteed benefit amount
        riderParticipants:
          type: array
          items:
            type: object
            required:
            - taxId
            properties:
              insuredAgeAtIssue:
                type: integer
                format: int32
                minimum: 0
                maximum: 150
              taxId:
                type: string
                maxLength: 9
                pattern: ^[0-9]{9}$
                minLength: 9
        charge:
          type: object
          properties:
            riderExerciseCharge:
              type: number
              multipleOf: 0.01
              minimum: 0
              maximum: 9999999999.99
            riderExerciseChargeRate:
              type: number
              multipleOf: 0.01
              minimum: 0
              maximum: 100
        maximumChronicIllnessBenefitPercentage:
          type: number
          minimum: 0
          description: The highest percentage of the death benefit or face amount
            that can be taken for chronic illness coverage
        maximumPeriodicPaymentPeriod:
          type: integer
          minimum: 0
          description: The maximum duration over which payments can be made under
            the rider ( in Months)
        riderPaymentDate:
          type: string
          format: date
          description: The date the benefit payout under the rider is to be disbursed
            to the policyholder or beneficiary
        remainingBenefit:
          type: number
          minimum: 0
          maximum: 9999999999.99
          description: The remaining benefit amount for the rider. Incremented by
            Premiums and adjusted by withdrawals.
        isAdditionalBenefitUsedUp:
          type: boolean
          description: Indicates whether the ADL benefit is utilised on the contract.
        totalBenefit:
          type: number
          minimum: 0
          maximum: 9999999999.99
          description: The total guaranteed value the contract owner is entitled to
            at the end of the GMAB holding period — assuming no disqualifying withdrawals
            or events.
        payoutOption:
          type: string
          enum:
          - SINGLE
          - JOINT
          description: Single or Joint Payout (not driven by Owners on the policy,
            even a jointly owned policy can have single as an option. Used in configuration
            to set different GMWB benefits for Single and Joint GMWB Amount Types
        benefitPercent:
          type: number
          minimum: 0
          maximum: 100
          description: Ties to Withdrawal Reset Benefit % Annual Limit on Calender
            Processing if GMWB Anniversary Base reset is elected. Equals result of
            GMWB Benefit % equation box in Withdrawal tab (GMWB) Ku - Payout Factor  Percentage
            of the benefit base that will be available for withdrawal each year
        annualBenefitLimit:
          type: number
          minimum: 0
          maximum: 9999999999.99
          description: GMWB Annual Limit, The total amount that can be withdrawn as
            a benefit of this rider in any given policy year, regardless of whether
            or not there is sufficient account value. It is also the annual limit
            on amounts that can be withdrawn without adversely affecting future annual
            and lifetime benefits from the rider.this amount will be impacted during
            Reset or Withdrawals or Premium events
        riderSubType:
          type: string
          pattern: ^[A-Za-z0-9_ -]{1,100}$
          maxLength: 100
          description: Subtype classification for the rider.
        livesType:
          type: string
          enum:
          - SINGLE
          - JOINT
          - MULTIPLE
          - UNKNOWN
          description: For living benefit riders identifies if single or joint life
            rider
        isParticipantIrrevocable:
          type: boolean
          description: Irrevocable Ind
        additionalRiderClassification:
          type: string
          pattern: ^[A-Za-z0-9_ -]{1,100}$
          maxLength: 100
          description: Additional rider classification code. Additional rider classification
            retained per DD naming.
        riderFreeAmt:
          type: number
          minimum: 0
          maximum: 9999999999.99
          description: Legacy DD abbreviation retained; represents rider free amount.
        participantRoleCode:
          type: string
          pattern: ^[A-Za-z0-9_ -]{1,100}$
          maxLength: 100
          description: Role code describing the rider participant.
    RidersList:
      type: object
      properties:
        startIndex:
          type: integer
          minimum: 0
          description: Used for pagination to indicate where the returned page starts
            within the full result set.
        itemsCount:
          type: integer
          minimum: 0
          description: Number of records included in the current response page.
        totalItemsCount:
          type: integer
          minimum: 0
          description: Total number of records available that match the request criteria,
            independent of pagination.
        riders:
          type: array
          items:
            $ref: '#/components/schemas/Rider'
          description: Represents the set of rider benefits or additional features
            attached to the base policy, including their status, coverage details,
            and associated benefit values.
    PayoutsList:
      type: object
      properties:
        startIndex:
          type: integer
          minimum: 0
          description: Used for pagination to indicate where the returned page starts
            within the full result set.
        itemsCount:
          type: integer
          minimum: 0
          description: Number of records included in the current response page.
        totalItemsCount:
          type: integer
          minimum: 0
          description: Total number of records available that match the request criteria,
            independent of pagination.
        incomeArrangements:
          type: array
          items:
            type: object
            required:
            - annuitization
            - incomePayment
            properties:
              incomeArrangementId:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,100}$
              annuitization:
                type: object
                required:
                - isAnnuitized
                properties:
                  isAnnuitized:
                    type: boolean
                  annuitizationStartDateTime:
                    type: string
                    format: date-time
                  annuitizationEndDateTime:
                    type: string
                    format: date-time
                  annuitizationTypeCode:
                    type: string
                    enum:
                    - FIXED
                    - VARIABLE
                  periodCertain:
                    type: object
                    properties:
                      numberOfPayments:
                        type: string
                        pattern: ^\d+$
                        description: Total payment count. String type retained for
                          carrier-specific leading-zero semantics.
                  survivorReduction:
                    type: object
                    properties:
                      primaryreductionCode:
                        type: string
                        pattern: ^[A-Za-z0-9._-]{1,50}$
                      jointreductionCode:
                        type: string
                        pattern: ^[A-Za-z0-9._-]{1,50}$
              incomePayment:
                type: object
                properties:
                  incomePaymentId:
                    type: string
                    pattern: ^[A-Za-z0-9._-]{1,100}$
                  status:
                    type: string
                    enum:
                    - ACTIVE
                    - INACTIVE
                    - PENDING
                    - ENDED
                    description: A Feature Status in life insurance and annuities
                      indicates the current state or activation condition of a specific
                      feature within a policy or contract. It reflects whether a feature
                      is active, inactive, pending, or restricted, helping insurers,
                      agents, and policyholders track policy functionality
                  frequencyCode:
                    type: string
                    pattern: ^[A-Za-z0-9._-]{1,50}$
                    description: Frequency code value. String type retained for carrier-specific
                      code semantics.
                  amount:
                    type: object
                    properties:
                      value:
                        type: string
                        pattern: ^-?\d+(\.\d+)?$
                      amountType:
                        type: string
                        enum:
                        - GROSS
                        - NET
                        description: Indicates how the scheduled amount is defined
                          for the systematic program, such as a fixed amount, percentage,
                          maximum available amount, free withdrawal amount, withdrawal
                          until basis, earnings only, pro rata amount, or modified
                          earnings only.
                      amountCode:
                        type: string
                        pattern: ^[A-Za-z0-9._-]{1,50}$
                    description: The total benefit amount the rider provides (separate
                      from the base policy’s coverage.)
                  adjustments:
                    type: object
                    properties:
                      increasePercentage:
                        type: number
                        minimum: 0
                        maximum: 100
                  taxExclusion:
                    type: object
                    properties:
                      value:
                        type: string
                        pattern: ^-?\d+(\.\d+)?$
          description: List of income arrangements (annuitization + payout) for the
            policy; empty if none.
    TransactionsList:
      type: object
      properties:
        startIndex:
          type: integer
          minimum: 0
          description: Used for pagination to indicate where the returned page starts
            within the full result set.
        itemsCount:
          type: integer
          minimum: 0
          description: Number of records included in the current response page.
        totalItemsCount:
          type: integer
          minimum: 0
          description: Total number of records available that match the request criteria,
            independent of pagination.
        transactions:
          type: array
          items:
            type: object
            required:
            - transactionId
            - planCode
            - requestDate
            - effectiveDate
            - processDate
            - status
            - transactionReason
            - timestamp
            - version
            properties:
              transactionId:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,100}$
                description: Unique identifier assigned to the transaction.
              originalTransactionId:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,100}$
                description: The unique identifier of the reversed transaction. When
                  a transaction is reversed, this field holds the ID of the original
                  transaction that was reversed. We capture this to ensure proper
                  tracking and auditing of financial adjustments within the system
              partyPolicyChangeReferenceId:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,100}$
                description: Unique identifier for the impacted party data being updated
                  with a transaction or event. For example, if multiple addresses
                  are modified, this field identifies the specific address Id for
                  which change is being processed
              partyPolicyNewReferenceId:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,100}$
                description: Trigger to Pass in API which non financial was newly
                  added out of multiple change requests, for example a new email was
                  added
              planCode:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,50}$
                description: The Plan Code is a carrier-assigned unique identifier
                  used to distinguish a specific product, rate structure, and version
                  of a life insurance or annuity policy. It ensures accurate policy
                  tracking, pricing, and administration
              parentId:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,100}$
                description: The unique identifier of a Parent Transaction or Parent
                  Program ID. The value of parentId varies based on the transaction
                  type. >>For Subsequent Premium, One-Time Premium, Loan Repayment
                  (One-Time & Systematic) → The Parent Payment Transaction ID is stamped.
                  >> For Forceout and Disbursement → The Parent Money Out or Money
                  In Transaction ID is stamped
              transactionType:
                type: string
                enum:
                - SubsequentPayment
                - OneTimePremium
                - PartialWithdrawalOneTime
                - SystematicPartialWithdrawal
                - RequiredMinimumDistributionOneTime
                - SystematicRequiredMinimumDistribution
                - FullSurrender
                - FundTransfer
                - FundAllocationsChange
                - Sweep
                - DollarCostAverage
                - NewLoan
                - LoanRepaymentOneTime
                - SystematicLoanRepayment
                - Annuitization
                - SystematicAnnuityPayout
                - PayoutAmountChange
                - ServiceCharge
                - RiderCharge
                - ValueAdjustment
                - InterestCredit
                - AddressChange
                - EmailChange
                - PhoneNumberChange
                - BeneficiaryChange
                - OwnerChange
                - BankAccountChange
                - CommunicationPreferenceChange
                - Reinstatement
                - Lapse
                - Other
                description: Specifies the type of transaction being performed, such
                  as Premium Payment, Loan Repayment, Anniversary etc
              requestDate:
                type: string
                format: date
                description: The date when the transaction request was initiated or
                  received  in the system. For example, for system generated events
                  date on which transaction was initiated by the system for adhoc
                  events date on which transaction was received by the system.
              effectiveDate:
                type: string
                format: date
                description: Represents the date on which the policy or contract became
                  active and coverage officially began.
              processDate:
                type: string
                format: date
                description: Represents the date when the transaction is processed
                  by the system.
              reversalDate:
                type: string
                format: date
                description: The date when a transaction is reversed in the system
              status:
                type: string
                enum:
                - Pending
                - Completed
                - Failed
                - Reversed
                - Canceled
                - PendingReversal
                description: A Feature Status in life insurance and annuities indicates
                  the current state or activation condition of a specific feature
                  within a policy or contract. It reflects whether a feature is active,
                  inactive, pending, or restricted, helping insurers, agents, and
                  policyholders track policy functionality
              transactionReason:
                type: string
                enum:
                - ONETIMEPREMIUM
                - GRACEPERIODPREMIUM
                - REINSTATEMENTPREMIUM
                - EXCHANGE1035
                - SURRENDER
                - AMOUNTEXCESSTOMEC
                - AMOUNTEXCESSTOGUIDELINE
                - CURRENTVALUE
                - COSTBASIS
                - GUIDELINESINGLEPREMIUM
                - GUIDELINELEVELPREMIUM
                - SEVENPAYPREMIUM
                - TOTALYTDPREMIUMAMOUNT
                - FACEDECREASECOVERAGE
                - INITIALPREMIUMEXPIRATION
                - COMPLIANCE
                - STARTINGPRICE
                - LUMPSUM
                - FIVEYEARDEFERRAL
                - SPOUSALCONTINUATION
                - DISCOUNT
                - CONTROLBUSINESSINDICATOR
                - NATIONALCHANGEOFADDRESS
                description: The justification or business reason for the transaction
              transactionAmounts:
                $ref: '#/components/schemas/TransactionAmounts'
                description: Details of financial amounts associated with the transaction
              charges:
                type: array
                items:
                  type: object
                  properties:
                    chargeType:
                      type: string
                      enum:
                      - SERVICE_CHARGE
                      - RIDER_CHARGE
                      - ADMINISTRATIVE_CHARGE
                      - SURRENDER_CHARGE
                      - MVA
                      - TAX
                      - COST_OF_INSURANCE
                      - EXPENSE_CHARGE
                      - UNIT_EXPENSE_CHARGE
                      - WITHDRAWAL_CHARGE
                      - OTHER
                    isChargeWaived:
                      type: boolean
                    chargeWaiverReason:
                      type: string
                    chargeAmount:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
                    chargeAppliedRate:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
              taxWithholdingInstructions:
                type: array
                items:
                  $ref: '#/components/schemas/TaxWithholdingInstruction'
              timestamp:
                type: string
                format: date-time
                description: Create or Update timestamp of transaction event
              isReverseInitiated:
                type: boolean
                description: A boolean flag that applies only to financial transactions.
                  When set to true, it allows a backdated transaction to be processed.
                  This triggers a reversal on the policy to the earliest transaction
                  on the specified effective date, applies the new transaction, and
                  then reprocesses all subsequent transactions (similar to (R&R) process).
                  This ensures that the policy`s financial history remains accurate
                  and aligned with the backdated change.
              version:
                type: integer
                format: int32
                description: Version number
              externalIdentifiers:
                type: object
                properties:
                  referenceNumber:
                    type: string
                    pattern: ^[A-Za-z0-9._-]{1,100}$
                  externalTransactionId:
                    type: string
                    pattern: ^[A-Za-z0-9._-]{1,100}$
                  externalArrangementId:
                    type: string
                    pattern: ^[A-Za-z0-9._-]{1,100}$
                    description: Identifier used to uniquely recognize an existing
                      systematic program (e.g., SWP) associated with a contract. This
                      ID enables the system to determine whether a systematic arrangement
                      already exists and supports subsequent updates, modifications,
                      or termination of that arrangement.
    TransactionAmounts:
      type: object
      description: Details of financial amounts associated with the transaction
      properties:
        requestedAmount:
          type: number
          description: 'Required when `amountType` is AMOUNT. Must not be provided
            for PERCENTAGE, MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS, or EARNINGSONLY.

            '
          minimum: 0
          maximum: 9999999999.99
        requestedPercentage:
          type: number
          description: 'Required when `amountType` is PERCENTAGE. Must not be provided
            for AMOUNT, MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS, or EARNINGSONLY.

            '
          minimum: 0
          maximum: 100
        amountType:
          type: string
          enum:
          - AMOUNT
          - PERCENTAGE
          - MAX
          - FREEWITHDRAWALAMOUNT
          - WITHDRAWALUNTILBASIS
          - EARNINGSONLY
          description: Indicates how the scheduled amount is defined for the systematic
            program, such as a fixed amount, percentage, maximum available amount,
            free withdrawal amount, withdrawal until basis, earnings only, pro rata
            amount, or modified earnings only.
        disbursementType:
          type: string
          enum:
          - GROSS
          - NET
        disbursementPaymentForm:
          type: string
          enum:
          - DTCC
          - EFT
          - ACH
          - CHECK
          - WIRE
          description: Transaction disbursement payment form. Uses the recurring disbursement
            vocabulary with `EFT`; `EXCHANGE` is intentionally excluded because it
            applies only to party-level exchange servicing.
      required:
      - amountType
      - disbursementType
      allOf:
      - if:
          properties:
            amountType:
              const: AMOUNT
              description: Indicates how the scheduled amount is defined for the systematic
                program, such as a fixed amount, percentage, maximum available amount,
                free withdrawal amount, withdrawal until basis, earnings only, pro
                rata amount, or modified earnings only.
          required:
          - amountType
        then:
          required:
          - requestedAmount
          not:
            required:
            - requestedPercentage
      - if:
          properties:
            amountType:
              const: PERCENTAGE
              description: Indicates how the scheduled amount is defined for the systematic
                program, such as a fixed amount, percentage, maximum available amount,
                free withdrawal amount, withdrawal until basis, earnings only, pro
                rata amount, or modified earnings only.
          required:
          - amountType
        then:
          required:
          - requestedPercentage
          not:
            required:
            - requestedAmount
      - if:
          properties:
            amountType:
              enum:
              - MAX
              - FREEWITHDRAWALAMOUNT
              - WITHDRAWALUNTILBASIS
              - EARNINGSONLY
              description: Indicates how the scheduled amount is defined for the systematic
                program, such as a fixed amount, percentage, maximum available amount,
                free withdrawal amount, withdrawal until basis, earnings only, pro
                rata amount, or modified earnings only.
          required:
          - amountType
        then:
          required:
          - amountType
          not:
            anyOf:
            - required:
              - requestedAmount
            - required:
              - requestedPercentage
    UnderlyingAssets:
      type: object
      properties:
        startIndex:
          type: integer
          minimum: 0
          description: Used for pagination to indicate where the returned page starts
            within the full result set.
        itemsCount:
          type: integer
          minimum: 0
          description: Number of records included in the current response page.
        totalItemsCount:
          type: integer
          minimum: 0
          description: Total number of records available that match the request criteria,
            independent of pagination.
        underlyingAssets:
          type: array
          items:
            type: object
            required:
            - insuranceActivityFundID
            properties:
              insuranceActivityFundID:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,50}$
              insuranceActivityFundAmount:
                type: string
                pattern: ^-?\d+(\.\d+)?$
              insuranceActivityFundAmountDebitCreditIndicator:
                type: string
                enum:
                - DEBIT
                - CREDIT
              insuranceActivityFundUnitAmount:
                type: string
                pattern: ^-?\d+(\.\d+)?$
              insuranceActivityFundUnitAmountDebitCreditIndicator:
                type: string
                enum:
                - DEBIT
                - CREDIT
              insuranceActivityFundUnitPriceAmount:
                type: string
                pattern: ^-?\d+(\.\d+)?$
              insuranceProductSubAccountProductFullName:
                type: string
                maxLength: 200
              insuranceProductSubAccountAssetClassCode:
                type: string
                enum:
                - FIXED
                - VARIABLE
                - INDEXED
                - MODEL
                - CASH
                - EQUITY
                - OTHER
                description: Asset class classification code.
              insuranceActivityMutualFundCusipNumber:
                type: string
                pattern: ^[0-9]{3}[A-Z0-9]{5}[0-9]$
                minLength: 9
                maxLength: 9
                description: Uses the standard CUSIP format.
              insuranceActivityFundMVAAmount:
                type: string
                pattern: ^-?\d+(\.\d+)?$
              insuranceActivityFundMVAAmountDebitCreditIndicator:
                type: string
                enum:
                - DEBIT
                - CREDIT
              insuranceActivityFundAdministrativeChargeAmount:
                type: string
                pattern: ^-?\d+(\.\d+)?$
              insuranceActivityFundAdministrativeChargeAmountDebitCreditIndicator:
                type: string
                enum:
                - DEBIT
                - CREDIT
              insuranceActivityFundSurrenderChargeAmount:
                type: string
                pattern: ^-?\d+(\.\d+)?$
              insuranceActivityFundSurrenderChargeAmountDebitCreditIndicator:
                type: string
                enum:
                - DEBIT
                - CREDIT
              insuranceActivityFundEmployerAmount:
                type: string
                pattern: ^-?\d+(\.\d+)?$
              insuranceActivityFundEmployerAmountDebitCreditIndicator:
                type: string
                enum:
                - DEBIT
                - CREDIT
              insuranceActivityFundEmployeeAmount:
                type: string
                pattern: ^-?\d+(\.\d+)?$
              insuranceActivityFundEmployeeAmountDebitCreditIndicator:
                type: string
                enum:
                - DEBIT
                - CREDIT
          description: List of underlying asset/fund-level breakdown records tied
            to a transaction activity.
    TaxWithholdingInstruction:
      type: object
      description: Tax withholding instructions. Exactly one of dollar or percentage
        may be provided when taxRateToUse expects entered values. filingStatus remains
        optional per the data dictionary.
      properties:
        party:
          anyOf:
          - $ref: '#/components/schemas/IndividualIdentity'
          - $ref: '#/components/schemas/EntityIdentity'
        taxWithholdingType:
          type: string
          enum:
          - FEDERAL
          - STATE
          - NRA
          - BACKUP
        taxRateToUse:
          type: string
          enum:
          - NOWITHHOLDINGELECTED
          - USEVALUESENTERED
          - NOWITHHOLDINGALLOWED
          - USEDEFAULTTABLE
        filingStatus:
          type: string
          enum:
          - SINGLE
          - DOMESTICPARTNERSHIP
          - DEFAULT
          - MARRIED
          - HEADOFHOUSEHOLD
          - WIDOWED
          - DIVORCED
          description: Optional per data dictionary. Typically provided when `taxRateToUse`
            is `USEDEFAULTTABLE` and filing status is needed to determine the applicable
            withholding table; do not treat this field as universally required.
        dollar:
          type: number
          description: Fixed dollar amount to withhold. Mutually exclusive with percentage;
            provide one, not both.
          minimum: 0
          maximum: 9999999999.99
        percentage:
          type: number
          description: Percentage rate to withhold. Mutually exclusive with dollar;
            provide one, not both.
          minimum: 0
          maximum: 100
        exemptions:
          type: integer
          minimum: 0
          maximum: 99
        taxJurisdiction:
          type: string
          maxLength: 50
      required:
      - taxRateToUse
      - taxWithholdingType
      oneOf:
      - required:
        - dollar
      - required:
        - percentage
      allOf:
      - if:
          properties:
            taxWithholdingType:
              const: STATE
          required:
          - taxWithholdingType
        then:
          required:
          - taxJurisdiction
    IndividualParty:
      description: Schema for individual party data
      type: object
      allOf:
      - $ref: '#/components/schemas/IndividualIdentity'
      - $ref: '#/components/schemas/PartyRelationship'
    EntityParty:
      description: Schema for entity party data
      type: object
      allOf:
      - $ref: '#/components/schemas/EntityIdentity'
      - $ref: '#/components/schemas/PartyRelationship'
    IndividualIdentity:
      description: Schema for individual identity data
      required:
      - firstName
      - lastName
      - taxId
      - type
      type: object
      properties:
        type:
          type: string
          const: individual
        firstName:
          type: string
          minLength: 1
          maxLength: 100
          pattern: ^[a-zA-Z0-9=()*@#\s.,'_/~%$!();:&"®`\\?\-]{1,100}$
        middleName:
          type: string
          minLength: 1
          maxLength: 100
          pattern: ^[a-zA-Z0-9=()*@#\s.,'_/~%$!();:&"®`\\?\-]{1,100}$
        lastName:
          type: string
          minLength: 1
          maxLength: 100
          pattern: ^[a-zA-Z0-9=()*@#\s.,'_/~%$!();:&"®`\\?\-]{1,100}$
        taxId:
          type: string
          maxLength: 9
          pattern: ^[0-9]{9}$
          minLength: 9
    PartyRelationship:
      description: Schema for party relationship data
      type: object
      required:
      - relationships
      properties:
        relationships:
          type: array
          minItems: 1
          maxItems: 6
          items:
            type: string
            enum:
            - owner
            - jointOwner
            - annuitant
            - jointAnnuitant
            - primaryBeneficiary
            - contingentBeneficiary
          description: Canonical response-body relationship vocabulary. Uses camelCase
            relationship values returned by the service and is intentionally narrower
            than the PartyRole query filter vocabulary. A single party may hold multiple
            concurrent relationships, so maxItems is aligned to the full response
            vocabulary.
    EntityIdentity:
      description: Schema for entity identity data
      type: object
      required:
      - type
      - name
      - taxId
      properties:
        type:
          type: string
          const: entity
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: ^[\w=()*@#\s.,'\/~%$!;:&"®`\\?\-]{1,100}$
        taxId:
          type: string
          maxLength: 9
          pattern: ^[0-9]{9}$
          minLength: 9
    Bank:
      type: object
      required:
      - nameOnAccount
      - accountType
      - accountNumber
      - routingNumber
      properties:
        bankId:
          type: string
          maxLength: 100
        nameOnAccount:
          type: string
          maxLength: 100
        accountStatus:
          type: string
          enum:
          - ACTIVEBANKACCOUNT
          - TERMINATEDBANKACCOUNT
        accountType:
          type: string
          enum:
          - CHECKING
          - SAVINGS
          - CREDITCARDACCOUNT
          - DEBITCARDACCOUNT
          - BROKERAGEACCOUNT
          - CERTIFICATEOFDEPOSITACCOUNT
        accountNumber:
          type: string
          pattern: ^\d{4,17}$
          maxLength: 17
        routingNumber:
          type: string
          pattern: ^\d{9}$
        branchName:
          type: string
          maxLength: 100
    Address:
      type: object
      required:
      - addressType
      - addressLine1
      - city
      - state
      - zipCode
      properties:
        addressId:
          type: string
          maxLength: 100
        addressType:
          type: string
          enum:
          - RESIDENCE
          - BUSINESS
          - POBOXSEASONAL
          - OTHER
        addressLine1:
          type: string
          maxLength: 100
        addressLine2:
          type: string
          maxLength: 100
        addressLine3:
          type: string
          maxLength: 100
        addressLine4:
          type: string
          maxLength: 100
        addressLine5:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        state:
          type: string
          pattern: ^[A-Z]{2}$
        zipCode:
          type: string
          pattern: ^[0-9A-Za-z -]{3,10}$
        zipCodeExtension:
          type: string
          pattern: ^[0-9A-Za-z]{1,4}$
        country:
          type: string
          pattern: ^[A-Z]{2}$
    Phone:
      type: object
      required:
      - countryCode
      - areaCode
      - dialNumber
      properties:
        startDate:
          type: string
          format: date
          description: The date when the systematic program begins executing payments
            or transfers (entered by user)
        endDate:
          type: string
          format: date
          description: The date Special Program ends (Entered by user or determined
            by LPS based on Account Value)
        phoneType:
          type: string
          enum:
          - MOBILE
          - HOME
          - BUSINESS
          - CLAIMCENTER
          - CUSTOMERSERVICE
          - CORPORATEOFFICE
          - FAX
          - UNKNOWN
          - OTHER
        countryCode:
          type: string
          pattern: ^\+?[0-9]{1,3}$
        areaCode:
          type: string
          pattern: ^[0-9]{2,5}$
          description: Supports domestic and international numbering plans; 2 to 5
            digits are allowed.
        dialNumber:
          type: string
          pattern: ^[0-9]{4,12}$
        extension:
          type: string
          pattern: ^[A-Za-z0-9-]{1,10}$
        bestTime:
          type: string
          enum:
          - MORNING
          - AFTERNOON
          - EVENING
          - ANYTIME
        timezone:
          type: string
          pattern: ^[A-Za-z_]+/[A-Za-z_]+(?:/[A-Za-z_]+)?$
        isPreferred:
          type: boolean
        phoneId:
          type: string
          pattern: ^[A-Za-z0-9._-]{1,100}$
    Email:
      type: object
      required:
      - emailAddress
      properties:
        startDate:
          type: string
          format: date
          description: The date when the systematic program begins executing payments
            or transfers (entered by user)
        endDate:
          type: string
          format: date
          description: The date Special Program ends (Entered by user or determined
            by LPS based on Account Value)
        emailType:
          type: string
          enum:
          - PERSONAL
          - BUSINESS
          - CUSTOMERSERVICE
          - OTHER
        emailAddress:
          type: string
          format: email
          pattern: ^[^@\s]+@[^@\s]+\.[^@\s]+$
        isPreferred:
          type: boolean
        emailId:
          type: string
          pattern: ^[A-Za-z0-9._-]{1,100}$
    Identification:
      type: object
      required:
      - startDate
      - endDate
      properties:
        identificationId:
          type: string
          pattern: ^[A-Za-z0-9._-]{1,100}$
        startDate:
          type: string
          format: date
          description: The date when the systematic program begins executing payments
            or transfers (entered by user)
        endDate:
          type: string
          format: date
          description: The date Special Program ends (Entered by user or determined
            by LPS based on Account Value)
        identificationType:
          type: string
          enum:
          - PASSPORT
          - STATEPHOTOID
          - DRIVERLICENSENUMBER
          - SSN
          - TIN
          - EXTERNAL
          - EIN
          - OTHER
        identificationKey:
