              insuranceActivityFundMVAAmount: '0.00'
              insuranceActivityFundMVAAmountDebitCreditIndicator: CREDIT
              insuranceActivityFundAdministrativeChargeAmount: '0.00'
              insuranceActivityFundAdministrativeChargeAmountDebitCreditIndicator: CREDIT
              insuranceActivityFundSurrenderChargeAmount: '0.00'
              insuranceActivityFundSurrenderChargeAmountDebitCreditIndicator: CREDIT
              insuranceActivityFundEmployerAmount: '0.00'
              insuranceActivityFundEmployerAmountDebitCreditIndicator: CREDIT
              insuranceActivityFundEmployeeAmount: '0.00'
              insuranceActivityFundEmployeeAmountDebitCreditIndicator: CREDIT
  headers:
    correlationId:
      description: Correlates this response to requests and downstream logs.
      schema:
        type: string
        maxLength: 100
  schemas:
    PolicySummary:
      type: object
      required:
      - carrierId
      - currency
      - effectiveDate
      - issueType
      - policyLastRefreshDateTime
      - policyStatus
      - product
      properties:
        effectiveDate:
          type: string
          format: date
          description: Represents the date on which the policy or contract became
            active and coverage officially began.
        cusip:
          type: string
          minLength: 9
          maxLength: 9
          pattern: ^[0-9]{3}[A-Z0-9]{5}[0-9]$
          description: Optional identifier used when policyNumber is not globally
            unique
        carrierId:
          type: string
          maxLength: 10
          description: Carrier identifier
        carrierName:
          type: string
          maxLength: 200
          description: Carrier Name
        policyLastRefreshDateTime:
          type: string
          format: date-time
          description: Policy last refresh date and time
        product:
          $ref: '#/components/schemas/Product'
          description: Product metadata for this policy
        qualificationType:
          type: string
          enum:
          - Non-Qualified
          - Solo 401k
          - 401k
          - 403b
          - 457 Deferred Compensation
          - Inherited IRA
          - IRA Spousal
          - Educational IRA
          - IRA
          - IRA Rollover
          - IRA Transfer
          - Roth IRA
          - Roth IRA - Inherited
          - SEP IRA
          - SIMPLE IRA
          - Pension Plan
          - Cash Balance Plan-Defined Contributions
          - Solo Defined Benefit
          - Cash Balance Plan-Defined Benefit
          - Profit Sharing Plan
          - Money Purchase Plan
          - SAREP
          - 401g
          - HR10
          - Welfare Benefit Plan
          - Roth 401K
          - Roth 403b
          - Roth 457
          description: IRS qualification type of the policy
        policyStatus:
          type: string
          enum:
          - PENDINGISSUED
          - ACTIVE
          - LAPSED
          - SURRENDERED
          - TERMINATED
          description: Current policy status
        hasRestriction:
          type: boolean
          description: Restriction status on the policy
        restrictions:
          type: array
          description: Required when `hasRestriction` is true.
          items:
            $ref: '#/components/schemas/RestrictionReason'
        issueType:
          type: string
          enum:
          - FULLUNDERWRITING
          - SIMPLIFIED
          - GUARANTEED
          description: Issue type / underwriting type
        issueState:
          type: string
          pattern: ^[A-Z]{2}$
          description: Issue state code
        currency:
          type: string
          pattern: ^[A-Z]{3}$
          description: Currency code
      allOf:
      - if:
          properties:
            hasRestriction:
              const: true
              description: Restriction status on the policy
          required:
          - hasRestriction
        then:
          required:
          - restrictions
          properties:
            restrictions:
              minItems: 1
              description: A set of constraints that may limit or condition certain
                actions on the policy, including transactional activities (such as
                withdrawals or surrenders) as well as other policy‑level servicing
                actions (such as changes, updates, or administrative operations).
        else:
          not:
            required:
            - restrictions
    RestrictionReason:
      type: object
      additionalProperties: false
      required:
      - reason
      - definition
      - category
      - subCategory
      properties:
        category:
          type: string
          enum:
          - PRODUCT_RULE
          - CONTRACT
          - AUTHORIZATION_IDENTITY
          - TRANSACTION
          - ARRANGEMENT
          - PARTY_CONTRACT_DATA
          description: Enum values use underscore-delimited tokens for consistency
            with the broader IRI style convention.
        subCategory:
          type: string
          enum:
          - TRANSFER_NOT_ELIGIBLE
          - STATUS_OR_GLOBAL_RESTRICTION
          - RESTRICTED_TRADES_FLAG
          - AGENT_NOT_AUTHORIZED
          - SHORT_TERM_TRADING_LIMIT
          - ANNUAL_TRANSFER_LIMIT_EXCEEDED
          - ENROLLMENT_CONFLICT
          - CONFLICTING_TRANSACTION_PENDING
          - COLLATERAL_ASSIGNMENT
          - RECENT_OWNER_CHANGE
          - RECENT_ADDRESS_CHANGE
          - LOAN_OUTSTANDING
          - CONFLICTING_RIDER
          - CONFLICTING_ARRANGEMENT
          - PRODUCT_RULES
          - EXCESSIVE_TRADING_RESTRICTION
          - NO_SIGNATURE_ON_FILE
          - INVALID_GOVT_ID
          - WITHDRAWAL_FULL_LIQUIDATION
          - WITHDRAWAL_SPECIFIED_AMOUNT
          - WITHDRAWAL_SPECIFIED_PERCENTAGE
          - WITHDRAWAL_INTEREST_ONLY
          - WITHDRAWAL_RMD
          - WITHDRAWAL_RIDER_FREE_AMOUNT
          - WITHDRAWAL_SURRENDER_FREE_AMOUNT
          - WITHDRAWAL_FUND_SPECIFIC
          - WITHDRAWAL_PRORATA
          - WITHDRAWAL_PRORATA_VARIABLE_FUNDS
          - WITHDRAWAL_SYSTEMATIC
          - DCA_RESTRICTION
          - SWEEP_RESTRICTION
          - REBALANCE_RESTRICTION
          - INVEST_RESTRICTION
          - PRORATA_INVEST_RESTRICTION
          - PRORATA_VARIABLE_FUNDS_INVEST_RESTRICTION
          - FUND_SPECIFIC_INVEST_RESTRICTION
          - WITHDRAWAL_RMD_CARRIER_CALC
        reason:
          type: string
          minLength: 1
          maxLength: 200
        definition:
          type: string
          minLength: 1
          maxLength: 500
    Product:
      type: object
      required:
      - planName
      - productType
      - planCode
      properties:
        planName:
          type: string
          maxLength: 200
        productType:
          type: string
          enum:
          - FIXED
          - VARIABLE
          - INDEXED
          - IMMEDIATE
          - DEFERRED
        shortName:
          type: string
          maxLength: 100
        planCode:
          type: string
          pattern: ^[A-Za-z0-9]{1,50}$
          description: The Plan Code is a carrier-assigned unique identifier used
            to distinguish a specific product, rate structure, and version of a life
            insurance or annuity policy. It ensures accurate policy tracking, pricing,
            and administration
    Error:
      type: object
      properties:
        code:
          type: string
          description: A structured error code <domain>.<category>.<subcategory>
          pattern: ^[a-zA-Z]+\.[a-zA-Z]+\.[a-zA-Z]+$
        timestamp:
          type: string
          format: date-time
          description: Create or Update timestamp of transaction event
        message:
          type: string
          description: Message with specific error details.
        validationErrors:
          type: array
          description: Logical rule violations or decision failures related to business
            logic or rules
          items:
            type: object
            properties:
              code:
                type: string
                description: Code to classify the error & Identifies the type of business
                  rule or decision failure. Matches the top-level Error.code token
                  pattern.
                pattern: ^[a-zA-Z]+\.[a-zA-Z]+\.[a-zA-Z]+$
              message:
                type: string
                description: Why the error occurred / Specific business rule violation
            required:
            - code
            - message
      required:
      - code
      - message
    PolicyValue:
      type: object
      required:
      - accountValues
      - valuesAsOfDate
      properties:
        valuesAsOfDate:
          type: string
          format: date
          description: Business 'as of' date for the returned values
        accountDesignation:
          type: string
          enum:
          - INDIVIDUAL
          - JOINT
          - TRUST
          - CUSTODIAL
          - OTHER
          description: Specifies the ownership structure of the policy (e.g., individual,
            joint, trust)
        jurisdiction:
          type: string
          pattern: ^[A-Z]{2}$
          description: Represents the governing state under which the policy is issued
            and regulated.
        sponsoringPlanSeparationDate:
          type: string
          format: date
          description: Date the participant separated from the sponsoring employer
            plan (used for qualified employer plans when determining withdrawal/surrender
            rules).
        payoutType:
          type: string
          enum:
          - DEFERRED
          - IMMEDIATE
          - ANNUITIZED
          - ACCUMULATION
          - UNKNOWN
          description: Indicates the current payout phase of the policy, such as whether
            the contract is in accumulation, deferred income, or annuitized payout
            mode.
        totalDepositITD:
          type: number
          minimum: 0
          maximum: 9999999999.99
          description: Total deposits inception-to-date (issue to current), including
            lump sum + subsequent premiums/contributions. Useful for cost basis context.
        surrenderChargeFreeDate:
          type: string
          format: date
          description: Date when the contract becomes free of surrender charges based
            on current premium history (can change if premiums reset the schedule).
        digitalPaymentTypeCode:
          type: string
          pattern: ^[A-Za-z0-9._-]{1,100}$
          description: Type code for supported digital payment rails for the contract/arrangements
            (e.g., Apple Pay, PayPal)
        digitalPaymentTypeDescription:
          type: string
          maxLength: 100
          description: Human-readable description of the digital payment type.
        accountValues:
          type: object
          properties:
            beginningAccountValue:
              type: number
              minimum: 0
              maximum: 9999999999.99
            endingAccountValue:
              type: number
              minimum: 0
              maximum: 9999999999.99
            minimumRequiredAccountValue:
              type: number
              minimum: 0
              maximum: 9999999999.99
            unloanedPortionOfAccountValue:
              type: number
              minimum: 0
              maximum: 9999999999.99
            loanedPortionOfAccountValue:
              type: number
              minimum: 0
              maximum: 9999999999.99
            surrenderValue:
              type: number
              minimum: 0
              maximum: 9999999999.99
            surrenderValueWithoutMarketValueAdjustment:
              type: number
              minimum: 0
              maximum: 9999999999.99
            guaranteedCashSurrenderValueFixed:
              type: number
              minimum: 0
              maximum: 9999999999.99
            guaranteedCashSurrenderValueIndexed:
              type: number
              minimum: 0
              maximum: 9999999999.99
            interestEarned:
              type: number
              minimum: 0
              maximum: 9999999999.99
              multipleOf: 0.01
            totalNetWithdrawalSinceIssue:
              type: number
              minimum: 0
              maximum: 9999999999.99
            totalGainWithdrawnSinceIssue:
              type: number
              minimum: 0
              maximum: 9999999999.99
          required:
          - endingAccountValue
          description: Represents consolidated financial values associated with the
            policy, including account balances, surrender values, and other valuation
            metrics used for reporting and servicing decisions.
        loanValues:
          type: object
          properties:
            totalLoanBalance:
              type: number
              minimum: 0
              maximum: 9999999999.99
            totalLoanPrincipal:
              type: number
              minimum: 0
              maximum: 9999999999.99
            loanPayoffAmount:
              type: number
              minimum: 0
              maximum: 9999999999.99
            maximumLoanAmount:
              type: number
              minimum: 0
              maximum: 9999999999.99
            minimumLoanAmount:
              type: number
              minimum: 0
              maximum: 9999999999.99
            totalLoanAccruedInterest:
              type: number
              minimum: 0
              maximum: 9999999999.99
            lastLoanInterestDueDate:
              type: string
              format: date
            totalNumberOfLoan:
              type: integer
              minimum: 0
            totalYearToDateLoanTaken:
              type: number
              minimum: 0
              maximum: 9999999999.99
          description: Provides details related to any outstanding loans against the
            policy, including balances, limits, and accrued interest amounts.(if applicable)
        withdrawalValues:
          type: object
          required:
          - yearToDateFreeWithdrawalAmount
          properties:
            totalWithdrawalAmount:
              type: number
              minimum: 0
              maximum: 9999999999.99
            freeWithdrawalAmount:
              type: number
              minimum: 0
              maximum: 9999999999.99
            yearToDateFreeWithdrawalAmount:
              type: number
              minimum: 0
              maximum: 9999999999.99
            minimumWithdrawalAmount:
              type: number
              minimum: 0
              maximum: 9999999999.99
            maximumWithdrawalAmount:
              type: number
              minimum: 0
              maximum: 9999999999.99
            freeAvailableAmount:
              type: number
              minimum: 0
              maximum: 9999999999.99
          description: Defines available withdrawal-related values and limits, including
            allowable withdrawal amounts and usage of free withdrawal provisions.
        marketValueAdjustment:
          type: object
          properties:
            isMarketValueAdjusted:
              type: boolean
          description: Indicates whether a market value adjustment (MVA) applies to
            the policy and signals that withdrawal or surrender values may be adjusted
            based on prevailing interest rate conditions.
        rmdInfo:
          type: object
          properties:
            rmdTaxYear:
              type: integer
              minimum: 1900
              maximum: 2100
            totalRMDAmountRemaining:
              type: number
              minimum: 0
              maximum: 9999999999.99
          description: RMD related values(if applicable)
        authorization:
          $ref: '#/components/schemas/Authorization'
          description: Identifies those entities that are allowed to complete financial
            and non-financial transactions.
    Authorization:
      type: object
      required:
      - businessMethods
      - authorizationEntities
      - authorizationTransaction
      properties:
        businessMethods:
          type: array
          items:
            type: string
            enum:
            - mail
            - electronic
            - fax
            - phone
            - voiceResponseUnit
            - internet
        authorizationEntities:
          type: array
          items:
            $ref: '#/components/schemas/AuthorizationEntity'
        authorizationTransaction:
          type: object
          required:
          - administrativeTransactions
          properties:
            administrativeTransactions:
              type: array
              items:
                type: string
                enum:
                - fundTransfer
                - withdrawal
                - arrangementAdministration
                - allTransactions
            isAuthorizationSignatureRequired:
              type: boolean
          description: Describes all the transactions that may be performed by the
            entitites.
    AuthorizationEntity:
      type: object
      properties:
        authorizationEntity:
          type: string
          maxLength: 100
        isAllAgentsAuthorized:
          type: boolean
          description: Identifier if all agents are permitted.
    PolicyFunds:
      type: object
      properties:
        startIndex:
          type: integer
          minimum: 0
          description: Used for pagination to indicate where the returned page starts
            within the full result set.
        itemsCount:
          type: integer
          minimum: 0
          description: Number of records included in the current response page.
        totalItemsCount:
          type: integer
          minimum: 0
          description: Total number of records available that match the request criteria,
            independent of pagination.
        funds:
          type: array
          items:
            type: object
            required:
            - fundAccountType
            - fundId
            - fundName
            - fundValuationDate
            properties:
              fundAccountType:
                type: string
                enum:
                - FIXED
                - INDEXED
                - VARIABLE
                - SWEEP
                - LOAN
                - OTHER
                description: Indicates the classification of the fund within the policy
                  (e.g., fixed, variable, indexed)
              fundId:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,50}$
                description: Fund identifier
              fundName:
                type: string
                maxLength: 200
                description: Fund display name
              fundPrice:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: Latest tradable price per fund unit
              fundValuationDate:
                type: string
                format: date
                description: As-of -date
              generalLedgerFundCode:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,50}$
                description: General ledger fund code (if provided)
              totalFundValue:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: Total current value in this fund
              interestGuaranteedPeriod:
                type: integer
                minimum: 0
                description: Guaranteed interest period (years)
              guaranteedMinimumInterestRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: Guaranteed minimum interest rate
              assetClass:
                type: string
                enum:
                - FIXED
                - VARIABLE
                - INDEXED
                - MODEL
                - CASH
                - EQUITY
                - OTHER
                description: High-level asset class of the fund/sub-account (e.g.,
                  FIXED, VARIABLE, INDEXED).
              productCode:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,50}$
                description: Unique fund/sub-account code for the product (carrier’s
                  fund code).
              carrierCode:
                type: string
                pattern: ^[A-Za-z0-9._-]{1,50}$
                description: Identifier for the carrier/source used to link to carrier
                  fund manager/reference data.
              investmentType:
                type: string
                enum:
                - FIXED
                - VARIABLE
                - INDEXED
                - MODEL
                - SUBACCOUNT
                - SEGMENT
                - OTHER
                description: 'Investment type for the fund (often aligns to fundAccountType:
                  FIXED / VARIABLE / INDEXED).'
              openDate:
                type: string
                format: date
                description: Date when the fund/sub-account was first opened on the
                  policy.
              availableFundsAmount:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: Represents the amount currently available for transfer
                  or withdrawal from the fund, after considering restrictions, surrender
                  charges, or product rules.
              capRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: cap rate applied to index crediting.
              isTransferSendAllowed:
                type: boolean
                description: Indicates whether funds can be transferred into this
                  fund based on restrictions, or fund status.
              isWithdrawalsAllowed:
                type: boolean
                description: True if withdrawals from this fund/sub-account are allowed.
              capAmount:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: cap amount (if product uses $ cap instead of %).
              isTransferDestAllowed:
                type: boolean
                description: Indicates whether funds can be transferred out of this
                  fund based on fund-level restrictions.
              guaranteedInterestRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: Guaranteed interest rate for fixed/indexed accounts (if
                  applicable).
              fundRestrictReason:
                type: string
                maxLength: 250
                description: Reason why the fund is restricted (free-text or code
                  display).
              bonusRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: Bonus rate currently declared for the fund/sub-account
                  (if applicable).
              financialActivity:
                type: string
                enum:
                - PREMIUM_ALLOCATION
                - TRANSFER_IN
                - TRANSFER_OUT
                - INTEREST_CREDIT
                - DIVIDEND_CREDIT
                - FEE_DEBIT
                - CHARGE_DEBIT
                - UNIT_ADJUSTMENT
                - VALUE_ADJUSTMENT
                - REBALANCE
                - DCA_IN
                - DCA_OUT
                - MVA_ADJUSTMENT
                - OTHER
                description: Indicates the type of financial transaction or activity
                  that impacted the fund, such as premium allocation, transfer, fee
                  deduction, or interest crediting.
              isFinancialActivityReversed:
                type: boolean
                description: True indicates that the financial activity has been reversed.
              appliesToCoverageId:
                type: string
                maxLength: 200
                description: For annuity, reference to the rider object that the financial
                  activity applies.
              arrangementRefId:
                type: string
                maxLength: 200
                description: Reference to the arrangement object that the financial
                  activity applies.
              financialActivityType:
                type: string
                enum:
                - PERFORMANCE_LOCK
                description: Enumeration value for the type of financial activity.
              financialActivityGrossAmount:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: The financial activity gross amount.
              financialEffectiveDate:
                type: string
                format: date
                description: The financial activity effective date.
              participationRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: participation rate used in index crediting.
              participationDownsideRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: downside participation rate (if indexed strategy supports
                  it).
              transferSendRestrictInfo:
                type: object
                description: Required when `isTransferSendAllowed` is false.
                required:
                - fundRestrictReason
                - startDate
                - endDate
                properties:
                  fundRestrictReason:
                    type: string
                    enum:
                    - CLOSED_TO_NEW_TRANSFER_IN
                    - RATE_LOCKED
                    - MARKET_VALUE_ADJUSTMENT_APPLIES
                    - MIN_HOLDING_REQUIREMENT
                    - MAX_ALLOCATION_LIMIT
                    - PRODUCT_RULE_RESTRICTION
                    - RIDER_RESTRICTION
                    - TERM_NOT_MET
                    - CARRIER_RESTRICTION
                    - OTHER
                    description: Reason why the fund is restricted (free-text or code
                      display).
                  startDate:
                    type: string
                    format: date
                    description: The date when the systematic program begins executing
                      payments or transfers (entered by user)
                  endDate:
                    type: string
                    format: date
                    description: The date Special Program ends (Entered by user or
                      determined by LPS based on Account Value)
              transferDestRestrictInfo:
                type: object
                description: Required when `isTransferDestAllowed` is false.
                required:
                - fundRestrictReason
                - startDate
                - endDate
                properties:
                  fundRestrictReason:
                    type: string
                    enum:
                    - TRANSFER_OUT_NOT_ALLOWED
                    - RATE_LOCKED
                    - SURRENDER_CHARGE_APPLIES
                    - MARKET_VALUE_ADJUSTMENT_APPLIES
                    - MIN_HOLDING_REQUIREMENT
                    - RIDER_RESTRICTION
                    - TERM_NOT_MET
                    - PRODUCT_RULE_RESTRICTION
                    - CARRIER_RESTRICTION
                    - OTHER
                    description: Reason why the fund is restricted (free-text or code
                      display).
                  startDate:
                    type: string
                    format: date
                    description: The date when the systematic program begins executing
                      payments or transfers (entered by user)
                  endDate:
                    type: string
                    format: date
                    description: The date Special Program ends (Entered by user or
                      determined by LPS based on Account Value)
              subAccountTerm:
                type: string
                pattern: ^\d+$
                description: Sub-account term period. String type retained for carrier
                  code compatibility.
              bufferRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: buffer rate (loss buffer) for buffered strategies.
              capThresholdRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: threshold rate used with cap/trigger structures.
              floorRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: floor rate (min crediting).
              mvaRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: Market value adjustment rate applied to this fund/sub-account
                  (if applicable).
              marginRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: margin/spread rate applied in index crediting.
              triggerRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: trigger rate used for trigger strategies.
              indexCreditingMethod:
                type: string
                enum:
                - ANNUAL_POINT_TO_POINT
                - MONTHLY_POINT_TO_POINT
                - DAILY_AVERAGE
                - MONTHLY_AVERAGE
                - TERM_END_POINT_TO_POINT
                - PERFORMANCE_TRIGGER
                - FIXED_RATE
                - DECLARED_RATE
                - SPREAD
                - PARTICIPATION_RATE
                - CAP_RATE
                - FLOOR_RATE
                - BUFFERED
                - DUAL_DIRECTIONAL
                - UNCAPPED
                - OTHER
                description: describes the crediting method and any related mode fields.
              indexCreditingMode:
                type: string
                enum:
                - POINT_TO_POINT
                - MONTHLY_AVERAGE
                - MONTHLY_SUM
                - DAILY_AVERAGE
                - ANNUAL_RESET
                - TERM_END
                - OTHER
                description: index crediting mode (e.g., POINT_TO_POINT, MONTHLY_AVG)
                  if applicable.
              indexType:
                type: string
                maxLength: 100
                description: index identifier/type (e.g., S&P 500, custom index).
              termPeriod:
                type: string
                pattern: ^\d+$
                description: Term period value. String type retained for carrier-specific
                  encoding.
              trackingValue:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: tracking value used for indexed crediting calculations.
              initialIndexBenchmarkValue:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: starting benchmark value for the current/initial term.
              currentIndexBenchmarkValue:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: current benchmark value as-of date (if provided).
              minimumCapRate:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: minimum cap rate (if product guarantees a minimum cap).
              indexCreditingDate:
                type: string
                format: date
                description: next/last crediting date for the index term.
              isLockFeatureEnabled:
                type: boolean
                description: True if the fund has a lock feature enabled (rate lock/index
                  lock).  If this is true then rateLockInfo value is required, else
                  it is not required.
              indexOptionPeriod:
                type: string
                pattern: ^\d+$
                description: Index option period. String type retained for carrier
                  code compatibility.
              accruedInterest:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: Accrued interest amount on the fund/sub-account (if carrier
                  provides).
              thresholdPercent:
                type: number
                minimum: 0
                maximum: 9999999999.99
                description: threshold percent used with threshold strategies.
              rateTier:
                type: object
                required:
                - indexReturnPercent
                - tieredRate
                - rateType
                properties:
                  indexReturnPercent:
                    type: number
                    minimum: 0
                    maximum: 100
                  tieredRate:
                    type: number
                    minimum: 0
                    maximum: 9999999999.99
                  rateType:
                    type: string
                    enum:
                    - PARTICIPATION
                    - DOWNSIDE_PARTICIPATION
                    description: Enum values normalized to uppercase underscore style
                      for consistency.
              fundSegments:
                type: array
                items:
                  type: object
                  required:
                  - segmentId
                  - fundId
                  - originalDepositAmount
                  - originalDepositDate
                  - depositDate
                  - depositAmount
                  - currentAmount
                  - renewalDate
                  - numberOfUnits
                  - sweepAccountId
                  - startDate
                  - endDate
                  properties:
                    segmentId:
                      type: string
                      pattern: ^[A-Za-z0-9._-]{1,100}$
                    fundId:
                      type: string
                      maxLength: 200
                      pattern: ^[A-Za-z0-9._-]{1,50}$
                      description: Fund identifier
                    originalDepositAmount:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
                    originalDepositDate:
                      type: string
                      format: date
                    depositDate:
                      type: string
                      format: date
                    depositAmount:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
                    currentAmount:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
                    renewalDate:
                      type: string
                      format: date
                    numberOfUnits:
                      type: number
                      minimum: 0
                    sweepAccountId:
                      type: string
                      pattern: ^[A-Za-z0-9._-]{1,100}$
                    interestEarningAmount:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
                    appliedInterestRate:
                      type: number
                      minimum: 0
                      maximum: 100
                    startingPrice:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
                    startingPriceDate:
                      type: string
                      format: date
                    endingPrice:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
                    endingPriceDate:
                      type: string
                      format: date
                    startDate:
                      type: string
                      format: date
                      description: The date when the systematic program begins executing
                        payments or transfers (entered by user)
                    endDate:
                      type: string
                      format: date
                      description: The date Special Program ends (Entered by user
                        or determined by LPS based on Account Value)
                    maxPrice:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
                    maxPriceDate:
                      type: string
                      format: date
              rateLockInfo:
                type: object
                description: Required when `isLockFeatureEnabled` is true.
                properties:
                  rateType:
                    type: string
                    maxLength: 100
                  lockStartDate:
                    type: string
                    format: date
                  lockEndDate:
                    type: string
                    format: date
                  lockPeriod:
                    type: number
                    minimum: 0
                required:
                - rateType
                - lockStartDate
                - lockEndDate
            allOf:
            - if:
                properties:
                  isTransferSendAllowed:
                    const: false
                    description: Indicates whether funds can be transferred into this
                      fund based on restrictions, or fund status.
                required:
                - isTransferSendAllowed
              then:
                required:
                - transferSendRestrictInfo
              else:
                not:
                  required:
                  - transferSendRestrictInfo
            - if:
                properties:
                  isTransferDestAllowed:
                    const: false
                    description: Indicates whether funds can be transferred out of
                      this fund based on fund-level restrictions.
                required:
                - isTransferDestAllowed
              then:
                required:
                - transferDestRestrictInfo
              else:
                not:
                  required:
                  - transferDestRestrictInfo
            - if:
                properties:
                  isLockFeatureEnabled:
                    const: true
                    description: True if the fund has a lock feature enabled (rate
                      lock/index lock).  If this is true then rateLockInfo value is
                      required, else it is not required.
                required:
                - isLockFeatureEnabled
              then:
                required:
                - rateLockInfo
              else:
                not:
                  required:
                  - rateLockInfo
          description: Represents the collection of funds or sub-accounts associated
            with the policy, including their balances, values, and investment characteristics.
    PartiesList:
      type: object
      properties:
        startIndex:
          type: integer
          minimum: 0
          description: Used for pagination to indicate where the returned page starts
            within the full result set.
        itemsCount:
          type: integer
          minimum: 0
          description: Number of records included in the current response page.
        totalItemsCount:
          type: integer
          minimum: 0
          description: Total number of records available that match the request criteria,
            independent of pagination.
        parties:
          type: array
          items:
            $ref: '#/components/schemas/Party'
          description: Represents all individuals or entities associated with the
            policy, including their identity, relationship to the contract, and role
            in policy servicing or benefit distribution.
    Party:
      description: The parties object represents policy parties such as owners, annuitants,
        beneficiaries, payees, trustees, and agents, together with their identity,
        relationship, and servicing instructions.
      type: object
      allOf:
      - type: object
        properties:
          paymentForm:
            type: string
            enum:
            - DTCC
            - ACH
            - CHECK
            - WIRE
            - EXCHANGE
            description: Party-level payment form. `EXCHANGE` is retained only for
              party-level exchange servicing scenarios; recurring disbursement schemas
              intentionally use the narrower ACH/EFT/CHECK/WIRE/DTCC vocabularies.
          allocationPercentage:
            type: number
            minimum: 0
            maximum: 100
            description: Specifies the percentage share of benefits, proceeds, or
              transaction allocation assigned to the party
          bank:
            $ref: '#/components/schemas/Bank'
          address:
            $ref: '#/components/schemas/Address'
          phones:
            type: array
            items:
              $ref: '#/components/schemas/Phone'
          emails:
            type: array
            items:
              $ref: '#/components/schemas/Email'
          identifications:
            type: array
            items:
              $ref: '#/components/schemas/Identification'
          taxWithholdingInstructions:
            type: array
            items:
              $ref: '#/components/schemas/TaxWithholdingInstruction'
          deathDetails:
            $ref: '#/components/schemas/DeathDetails'
      - anyOf:
        - $ref: '#/components/schemas/IndividualParty'
        - $ref: '#/components/schemas/EntityParty'
      - if:
          properties:
            paymentForm:
              enum:
              - ACH
              - WIRE
              - DTCC
              description: Specifies the method by which payments or disbursements
                related to the party will be made (e.g., ACH, check, wire).
          required:
          - paymentForm
        then:
          required:
          - bank
    PolicyProducers:
      type: object
      properties:
        producers:
          type: array
          items:
            $ref: '#/components/schemas/PolicyProducer'
          description: Represents the set of producers associated with the policy,
            including their identifying information and commission-related attributes
        startIndex:
          type: integer
          minimum: 0
          description: Zero-based index of the first item returned.
        itemsCount:
          type: integer
          minimum: 0
          description: Number of items in the current response.
        totalItemsCount:
          type: integer
          minimum: 0
          description: Total number of items available.
    PolicyProducer:
      type: object
