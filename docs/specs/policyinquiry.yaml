openapi: 3.1.0
info:
  title: Policy Inquiry
  version: 1.0.0
  description: Provides comprehensive servicing and inquiry capabilities. These endpoints
    allow clients to retrieve detailed information about a policy, financial values,
    parties, transactions, dates, riders, funds, producers, systematic programs, payouts,
    and underlying assets.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
paths:
  /v1/policies/{policyNumber}/summary:
    get:
      operationId: getPolicySummary
      tags:
      - Policy Summary
      description: 'Retrieves a comprehensive summary of the specified policy, including

        status, effective date, carrier, product metadata, and key attributes used

        for servicing and downstream processes.

        '
      parameters:
      - $ref: '#/components/parameters/CorrelationIdHeader'
      - $ref: '#/components/parameters/PolicyNumber'
      - $ref: '#/components/parameters/AssociatedFirmId'
