components:
  parameters:
    CorrelationIdHeader:
      name: correlationId
      in: header
      required: false
      description: Unique identifier to trace the request.
      schema:
        type: string
        maxLength: 100
    PolicyNumber:
      name: policyNumber
      in: path
      required: true
      description: Unique identifier of the policy.
      schema:
        type: string
        minLength: 1
        maxLength: 30
    AssociatedFirmId:
      name: associatedFirmId
      in: query
      required: false
      description: Optional firm/linkage identifier (preferred location per IRI).
      schema:
        type: string
        minLength: 1
        maxLength: 65
    StartDate:
      name: startDate
      in: query
      required: false
      description: Filter transactions from this date (inclusive).
      schema:
        type: string
        format: date
    EndDate:
      name: endDate
      in: query
      required: false
      description: Filter transactions up to this date (inclusive).
      schema:
        type: string
        format: date
    TransactionTypes:
      name: transactionTypes
      in: query
      required: false
      description: Filter by one or more transaction type codes (comma-separated).
        Values correspond to the transactionType field on each Transaction object.
      schema:
        type: string
        pattern: ^([A-Za-z][A-Za-z0-9]*)(,[A-Za-z][A-Za-z0-9]*)*$
    Limit:
      name: limit
      in: query
      required: false
      description: Page size (default 50, max 200).
      schema:
        type: integer
        minimum: 1
        maximum: 200
    PartyRole:
      name: partyRole
      in: query
      required: false
      description: Filter parties by role using the camelCase query key `partyRole`
        and DD-aligned PascalCase enum values. This filter vocabulary is intentionally
        broader than the response-body relationships enum; Payee, Payor, Agent, and
        Trustee are supported filter values even when not emitted in PartyRelationship.relationships.
      schema:
        type: string
        enum:
        - Owner
        - JointOwner
        - Annuitant
        - JointAnnuitant
        - Payee
        - Payor
        - PrimaryBeneficiary
        - ContingentBeneficiary
        - Agent
        - Trustee
    PartyStatus:
      name: partyStatus
      in: query
      required: false
      description: Filter parties by status. NOTAPPROVED is the canonical DD token
        (not split as NOT_APPROVED).
      schema:
        type: string
        enum:
        - APPROVED
        - NOTAPPROVED
        - PROCESSED
    TransactionId:
      name: transactionId
      in: query
      required: false
      description: Unique identifier assigned to the transaction. Uses the standard
        transaction identifier pattern for inquiry endpoints.
      schema:
        type: string
        pattern: ^[A-Za-z0-9._-]{1,100}$
        minLength: 1
        maxLength: 100
    StartIndex:
      name: startIndex
      in: query
      required: false
      description: Zero-based index of the first record to return.
      schema:
        type: integer
        minimum: 0
  responses:
    BadRequestError:
      description: Bad Request
      content:
