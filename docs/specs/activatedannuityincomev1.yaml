openapi: 3.1.0
info:
  title: Activated Annuity Income API
  version: "1.0.0"
  description: APIs for managing income activation of policies
paths:
  /v1/policies/{policyNumber}/income-activation:
    get:
      operationId: getAnnuityIncomeActivationByPolicyNumber
      summary: Get Annuity Income Activation By PolicyNumber.
      description: Get Annuity Income Activation By PolicyNumber.
      tags:
        - Annuity Income Activation
      parameters:
        - $ref: '#/components/parameters/policyNumber'
        - $ref: '#/components/parameters/cusip'
        - $ref: '#/components/parameters/correlationId'
      responses:
          "200":
            description: Annuity Income Activation retrieved successfully.
            content:
              application/json:
                schema:
                     $ref: '#/components/schemas/AnnuityIncomeActivationResponse'
          "400":
            description: Bad Request
          "401":
            description: Unauthorized 
          "404":
            description: Not Found
          "405":
            description: Method Not Allowed
          "500":
            description: Internal Server Error
          "503":
            description: Service Unavailable
          "504":
            description: Gateway Timeout.

  /v1/income-activation/searches: 
    post:
      operationId: getBulkActiveAnnuityIncomeSearch
      summary: Bulk Active Annuity Income Search
      description: Bulk Active Annuity Income Search by firmId and/or npn.
      tags:
        - Bulk Active Annuity Income Search
      parameters:
        - $ref: '#/components/parameters/correlationId'
      requestBody:
        content:
              application/json:
                schema:
                  $ref: '#/components/schemas/BulkAnnuityIncomeRequest'
      responses:
          "202":
            description: Bulk Annuity Income request is accepted.
          "400":
            description: Bad Request
          "401":
            description: Unauthorized 
          "404":
            description: Not Found
          "405":
            description: Method Not Allowed
          "500":
            description: Internal Server Error
          "503":
            description: Service Unavailable
          "504":
            description: Gateway Timeout.

  /v1/income-activation/event-notification:
    post:
      operationId: postBulkActiveAnnuityIncomeSearchStatus
      summary: Bulk Active Annuity Income Search Status Notification
      description: Bulk Active Annuity Income Search Status Notification
      tags:
        - Bulk Active Annuity Income Search Status Notification
      parameters:
        - $ref: '#/components/parameters/correlationId'
      requestBody:
        content:
              application/json:
                schema:
                  $ref: '#/components/schemas/BulkAnnuityIncomeNotificationRequest'
      responses:
          "200":
            description: Bulk Annuity Income Search Status
          "503":
            description: Service Unavailable


  /v1/income-activation/results: 
    post:
      operationId: gettBulkActiveAnnuityIncomeResults
      summary: Bulk Active Annuity Income Results
      description: Bulk Annuity Income Results
      tags:
        - Bulk Annuity Income Results
      parameters:
        - $ref: '#/components/parameters/correlationId'
      requestBody:
        content:
              application/json:
                schema:
                  $ref: '#/components/schemas/BulkAnnuityIncomeRequest'
      responses:
          "200":
            description: Bulk Annuity Incomes retrieved successfully.
            content:
              application/json:
                schema:
                    $ref: '#/components/schemas/BulkAnnuityIncomeResponse'
          "400":
            description: Bad Request
          "401":
            description: Unauthorized 
          "404":
            description: Not Found
          "405":
            description: Method Not Allowed
          "500":
            description: Internal Server Error
          "503":
            description: Service Unavailable
          "504":
            description: Gateway Timeout.
components:
  parameters:
    policyNumber:
      name: policyNumber
      description: Required path parameter for the policy number to be retrieved
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/policyNumber'
    cusip:
      name: cusip
      description: Optional query parameter for the CUSIP
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/cusip'
    correlationId:
      name: correlationId
      description: Optional custom header to be returned to the caller in response payload
      in: header
      required: false
      schema:
        type: string

  schemas:
    cusip:
      type: string
      minLength: 9
      maxLength: 9
      pattern:  ^[0-9]{3}[A-Z0-9]{5}[0-9]$
    policyNumber:
      type: string
      minLength: 1
      maxLength: 30
      examples: 
            - "P78A21423"
    startIndex:
      type: integer
    itemsCount:
      type: integer
    totalAvailableItemsCount:
      type: integer

    ActivatedAnnuityIncomeResponse:
      description: Schema for annuity income activation data
      type: object
      required: [policyNumber, isIncomeRiderActivated]
      properties:
        policyNumber:
          $ref: '#/components/schemas/policyNumber'
        cusip:
          type: string
          examples: 
            - "037833100"
        isIncomeActivated:
          type: boolean
        lastPaymentDate:
          type: string
          format: date
          examples: 
            - "2024-03-11"
        netPaymentAmount:
          type: number
          format: float
          examples: 
            - 5000.00
        grossPaymentAmount:
          type: number
          format: float
          examples: 
            - 2500.00
        paymentsPerYear:
          type: integer
          minimum: 1
          maximum: 365
          examples: 
            - 24
        incomeType:
          type: string
          enum:
            - annuitized
            - incomeRiders
            - scheduledPayments
            - rmd

    BulkActivatedAnnuityIncomeRequest:
      description: Schema for policy income activation data
      type: object
      required: [firmId]
      properties:
        firmId:
          type: string
          examples: 
            - "12345"
        npn:
          type: string
          examples: 
            - "257893456"

    BulkActivatedAnnuityIncomeResponse:
      description: Schema for bulk policy income response
      type: object
      properties:
        startIndex:
          $ref: '#/components/schemas/startIndex'
        itemsCount:  
          $ref: '#/components/schemas/itemsCount'
        totalAvailableItemsCount:  
          $ref: '#/components/schemas/totalAvailableItemsCount'
        annuityIncomes:
          $ref: '#/components/schemas/annuityIncomes'

    annuityIncomes:
      description: Schema for bulk annuity income response
      type: array
      items:
        $ref: '#/components/schemas/AnnuityIncomeActivationResponse'

    BulkActivatedAnnuityIncomeNotificationRequest:
      description: Schema for annuity income activation data
      type: object
      required: [status]
      properties:
        status:
          type: string
          examples: 
            - "complete"
        firmId:
          type: string
          examples: 
            - "12345"
        npn:
          type: string
          examples: 
            - "257893456"
