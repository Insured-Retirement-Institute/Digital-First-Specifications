name: Request SharePoint backup

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  request-backup:
    runs-on: ubuntu-latest

    steps:
      - name: Request central backup
        env:
          BACKUP_DISPATCH_TOKEN: ${{ secrets.BACKUP_DISPATCH_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_BRANCH: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          curl --fail-with-body -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${BACKUP_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/Insured-Retirement-Institute/github-sharepoint-backups/dispatches \
            -d "{\"event_type\":\"backup-repository\",\"client_payload\":{\"repository\":\"${SOURCE_REPO}\",\"branch\":\"${SOURCE_BRANCH}\",\"sha\":\"${SOURCE_SHA}\"}}"
